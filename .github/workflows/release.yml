name: Create release

on:
  push:
    branches:
      - main
    paths:
      - .claude-plugin/marketplace.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from marketplace.json
        id: version
        run: echo "version=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)" >> "$GITHUB_OUTPUT"

      - name: Create release if tag does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
          fi
